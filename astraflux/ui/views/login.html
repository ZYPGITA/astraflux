<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraFlux - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Dynamic background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(168, 85, 247, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(168, 85, 247, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            pointer-events: none;
            animation: float 20s ease-in-out infinite;
        }

        .bg-glow-1 {
            top: -200px;
            left: -200px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.3), transparent 70%);
        }

        .bg-glow-2 {
            bottom: -200px;
            right: -200px;
            background: radial-gradient(circle, rgba(124, 110, 240, 0.3), transparent 70%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -30px) scale(1.1);
            }
        }

        /* Login card */
        .login-wrapper {
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 48px 44px;
            width: 420px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05),
            0 25px 50px -12px rgba(0, 0, 0, 0.5),
            0 0 100px rgba(168, 85, 247, 0.1);
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #7c6ef0 0%, #a855f7 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.3);
        }

        .logo h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 4px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.2s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }

        .form-group input:focus + .input-wrapper svg,
        .input-wrapper:focus-within svg {
            color: #a855f7;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        /* Login button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c6ef0 0%, #a855f7 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-login:hover::before {
            opacity: 1;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        .btn-login.loading .spinner {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            opacity: 0.7;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Error message */
        .error-msg {
            color: #f87171;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            padding: 10px;
            background: rgba(248, 113, 113, 0.1);
            border-radius: 8px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .footer a {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #a855f7;
        }

        /* Version */
        .version {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
        }
    </style>
</head>
<body>
<!-- Background -->
<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<!-- Login card -->
<div class="login-wrapper">
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <h1>AstraFlux</h1>
            <p>Distributed Service Management Framework</p>
        </div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                         style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,0.3);">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"
                           required>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                         style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,0.3);">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <span class="spinner"></span>
                <span class="btn-text">Login</span>
            </button>

            <div class="error-msg" id="errorMsg"></div>
        </form>

        <div class="footer">
            <a href="https://github.com/ZYPGITA" target="_blank">GitHub</a>
        </div>
    </div>
</div>

<div class="version">v1.0.0</div>

<script>
    // Check if already logged in
    (function () {
        const logged = sessionStorage.getItem('logged_in');
        if (logged === 'true') {
            window.location.href = '/views/server.html';
        }
    })();

    async function handleLogin(e) {
        e.preventDefault();

        const btn = document.getElementById('btnLogin');
        const errEl = document.getElementById('errorMsg');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        // Clear error
        errEl.textContent = '';
        errEl.classList.remove('show');

        if (!username || !password) {
            errEl.textContent = 'Please enter username and password';
            errEl.classList.add('show');
            return false;
        }

        // Show loading state
        btn.classList.add('loading');
        btn.disabled = true;
        btn.querySelector('.btn-text').textContent = 'Logging in...';

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });

            const data = await res.json();

            if (data.status === 'success') {
                sessionStorage.setItem('logged_in', 'true');
                sessionStorage.setItem('username', username);
                window.location.href = '/views/server.html';
            } else {
                errEl.textContent = data.message || 'Login failed';
                errEl.classList.add('show');
            }
        } catch (err) {
            errEl.textContent = 'Network error, please try again later';
            errEl.classList.add('show');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
            btn.querySelector('.btn-text').textContent = 'Login';
        }

        return false;
    }

    // Submit on Enter key
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    });
</script>
</body>
</html>
